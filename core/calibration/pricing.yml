# Per-model pricing ($/1M tokens) for dollar cost estimates.
# Separated from priors.yml for easier patch-level updates when
# providers change pricing.
#
# Update this file when model pricing changes — this is a patch-level
# version bump per Fabrika's bump rules (core/** = minor, but pricing
# data updates alone = patch because they don't change methodology).
#
# Only models with `model:` declared in agent frontmatter can produce
# dollar estimates. Tier-only agents get token estimates without dollars.

pricing:
  # Claude models (as of 2025-05)
  claude-opus-4-6:
    input_per_1m: 15.00
    output_per_1m: 75.00
  claude-opus-4-5:
    input_per_1m: 15.00
    output_per_1m: 75.00
  claude-sonnet-4-6:
